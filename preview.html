<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Options</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0d1117;
    font-family:Segoe UI, sans-serif;
    color:white;
}

.title{
    font-size:2rem;
    font-weight:bold;
    color:#ffd700;
    margin-bottom:30px;
    text-shadow:0 0 10px rgba(255,215,0,0.3);
}

.container{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:300px;
    padding:30px;
    border-radius:18px;
    background:#161b22;
    border:2px solid #ffd700;
    text-align:center;
    box-shadow:0 0 15px rgba(255,215,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(255,215,0,0.3);
}

h2{
    margin:0 0 10px 0;
    color:#ffd700;
    font-size:1.6rem;
}

p{
    font-size:0.95rem;
    color:#c9d1d9;
    margin-bottom:20px;
}

a.button{
    display:inline-block;
    padding:10px 20px;
    border-radius:10px;
    background:#0d1117;
    color:#ffd700;
    border:1px solid #ffd700;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

a.button:hover{
    background:#ffd700;
    color:#0d1117;
}

footer{
    margin-top:40px;
    font-size:0.85rem;
    color:#8b949e;
}
</style>
</head>

<body>

<div class="title">¡Proyectos estrella!</div>

<div class="container">

<div class="card">
<h2>Smart-Chat</h2>
<p>Plataforma de chats privados y globales para hablar con amigos en tiempo real.</p>
<a class="button" href="https://smartium25.github.io/smart-chat.github.io/">Entrar</a>
</div>

<div class="card">
<h2>Smart-Web</h2>
<p>Red social estilo YouTube con videos, amigos y contenido interactivo.</p>
<a class="button" href="https://smartium25.github.io/smart-web.github.io/">Entrar</a>
</div>

</div>

<footer>
Copyright Max de Smartium
</footer>

</body>
</html>
